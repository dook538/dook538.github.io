<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้าน | ครูดุ๊ก</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-panel { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1557b0; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>⚙️ แผงควบคุม (Admin)</h1>
        
        <div class="form-group">
            <label>GitHub Token (กุญแจลับ):</label>
            <input type="password" id="token" placeholder="วาง ghp_... ที่นี่">
        </div>

        <hr style="margin: 30px 0;">

        <div class="form-group">
            <label>ชื่อที่แสดงหน้าแรก:</label>
            <input type="text" id="title-input" placeholder="เช่น ว่าที่ร้อยตรียืนยง แก้วระวัง">
        </div>

        <div class="form-group">
            <label>คำอธิบาย/ตำแหน่ง:</label>
            <input type="text" id="subtitle-input" placeholder="เช่น ครูวิทยฐานะชำนาญการ">
        </div>

        <button onclick="updateWebsite()">💾 บันทึกและอัปเดตเว็บ</button>
        
        <div id="status"></div>
    </div>

    <script>
        async function updateWebsite() {
            const token = document.getElementById('token').value;
            const newTitle = document.getElementById('title-input').value;
            const newSubtitle = document.getElementById('subtitle-input').value;
            const statusDiv = document.getElementById('status');

            if (!token) { statusDiv.innerText = "❌ กรุณากรอกรหัส Token ครับ"; return; }

            statusDiv.innerText = "⏳ กำลังเชื่อมต่อ GitHub...";
            statusDiv.style.color = "orange";

            const repo = "dook538/dook538.github.io";
            const path = "index.html";
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;

            try {
                // 1. ดึงไฟล์ปัจจุบันจาก GitHub
                const response = await fetch(url);
                const fileData = await response.json();
                const sha = fileData.sha;
                let content = atob(fileData.content);

                // 2. ใช้ Regex ในการค้นหาและแทนที่ข้อความ (Logic ที่เจมวางไว้)
                if (newTitle) {
                    const titleRegex = /(<h1 id="site-title">)(.*?)(<\/h1>)/;
                    content = content.replace(titleRegex, `$1${newTitle}$3`);
                }
                if (newSubtitle) {
                    const subtitleRegex = /(<p id="site-subtitle">)(.*?)(<\/p>)/;
                    content = content.replace(subtitleRegex, `$1${newSubtitle}$3`);
                }

                // 3. ส่งไฟล์ที่แก้ไขแล้วกลับไปที่ GitHub
                const updateResponse = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: "Update from Admin Panel",
                        content: btoa(unescape(encodeURIComponent(content))),
                        sha: sha
                    })
                });

                if (updateResponse.ok) {
                    statusDiv.innerText = "✅ อัปเดตสำเร็จ! เว็บจะเปลี่ยนใน 1-2 นาทีครับ";
                    statusDiv.style.color = "green";
                } else {
                    statusDiv.innerText = "❌ เกิดข้อผิดพลาด: รหัส Token อาจจะไม่ถูกต้อง";
                    statusDiv.style.color = "red";
                }

            } catch (error) {
                statusDiv.innerText = "❌ ล้มเหลว: " + error.message;
                statusDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
